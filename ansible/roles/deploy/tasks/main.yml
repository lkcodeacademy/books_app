---
- name: Create app directory on VM
  ansible.builtin.file:
    path: /opt/booksapp
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Copy docker-compose.prod.yml to VM
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../docker-compose.prod.yml"
    dest: /opt/booksapp/docker-compose.yml
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'

- name: Copy database initialization scripts
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../db/"
    dest: /opt/booksapp/db/
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Create .env file with app secrets
  ansible.builtin.copy:
    dest: /opt/booksapp/.env
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
    content: |
      DOCKERHUB_USERNAME={{ docker_username }}
      DB_PASSWORD={{ db_password }}

- name: Log in to Docker Hub
  community.docker.docker_login:
    username: "{{ docker_username }}"
    password: "{{ docker_token }}"
    
- name: Stop current stack
  command: docker compose -f "{{ app_dir }}/docker-compose.yml" down
  args:
    chdir: "{{ app_dir }}"
  ignore_errors: yes

- name: Remove old database volume (so init scripts run again)
  command: docker volume rm -f {{ app_dir | basename }}_db_data
  ignore_errors: yes

- name: Pull latest images from Docker Hub
  community.docker.docker_compose_v2:
    project_src: /opt/booksapp
    pull: always
    state: present

- name: Start application containers
  community.docker.docker_compose_v2:
    project_src: /opt/booksapp
    state: present
    recreate: auto
