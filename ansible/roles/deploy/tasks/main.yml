---
- name: Create app directory on VM
  ansible.builtin.file:
    path: /opt/booksapp
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Copy docker-compose.prod.yml to VM
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../docker-compose.prod.yml"
    dest: /opt/booksapp/docker-compose.yml
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'

- name: Create .env file with app secrets
  ansible.builtin.copy:
    dest: /opt/booksapp/.env
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
    content: |
      DOCKERHUB_USERNAME={{ docker_username }}
      DB_PASSWORD={{ db_password }}

- name: Log in to Docker Hub
  community.docker.docker_login:
    username: "{{ docker_username }}"
    password: "{{ docker_token }}"

- name: Pull latest images from Docker Hub
  community.docker.docker_compose_v2:
    project_src: /opt/booksapp
    pull: always
    state: present

- name: Start application containers
  community.docker.docker_compose_v2:
    project_src: /opt/booksapp
    state: present
    recreate: auto
