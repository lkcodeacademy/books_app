---
- name: Update apt cache and upgrade all packages
  ansible.builtin.apt:
    update_cache: yes
    upgrade: dist
    cache_valid_time: 3600

- name: Install essential packages
  ansible.builtin.apt:
    name:
      - curl
      - git
      - unzip
      - python3-pip
      - ca-certificates
      - gnupg
      - lsb-release
      - apt-transport-https
    state: present
