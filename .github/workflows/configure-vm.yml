name: Configure VM

on:
  workflow_dispatch:
    inputs:
      ec2_host:
        description: "EC2 public IP address (passed from create-infrastructure)"
        required: true

jobs:
  configure-vm:
    name: Run Ansible Playbook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible and dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible python3-jmespath
          ansible-galaxy collection install community.docker

      - name: Check Secrets Integrity
        shell: bash
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::SSH_PRIVATE_KEY secret is MISSING or EMPTY!"
            exit 1
          fi
          if [ -z "${{ secrets.VM_USER }}" ]; then
            echo "::error::VM_USER secret is MISSING or EMPTY!"
            exit 1
          fi
          echo "VM_USER is set to: ${{ secrets.VM_USER }}"
          KEY_LEN=$(echo -n "${{ secrets.SSH_PRIVATE_KEY }}" | wc -c)
          echo "Private Key Length: $KEY_LEN characters"
          echo -n "Key Prefix: "
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | head -n 1
          
      - name: Set up SSH private key
        run: |
          mkdir -p ~/.ssh
          # Repair and save the private key (strip \r and trailing space)
          printf "%s\n" "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' | sed 's/[[:space:]]*$//' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          # Integrity Check: Prove the private key is valid and can derive the public key
          echo "Verifying private key integrity..."
          ssh-keygen -y -f ~/.ssh/id_ed25519 || (echo "CRITICAL: Private key is CORRUPT or INVALID!" && exit 1)
          
          # Print fingerprint for comparison
          ssh-keygen -l -f ~/.ssh/id_ed25519

      - name: Verify Raw SSH Connectivity
        env:
          VM_HOST: ${{ github.event.inputs.ec2_host || secrets.VM_HOST }}
        run: |
          echo "Testing direct SSH connection to $VM_HOST as ec2-user..."
          # Force IdentitiesOnly to ignore any other potential keys/agents
          ssh -vvv -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i ~/.ssh/id_ed25519 ec2-user@$VM_HOST "echo 'Direct SSH Successful!'"

      - name: Run Ansible playbook
        working-directory: ansible
        env:
          VM_HOST: ${{ github.event.inputs.ec2_host || secrets.VM_HOST }}
          ANSIBLE_REMOTE_USER: ec2-user
          ANSIBLE_PRIVATE_KEY_FILE: /home/runner/.ssh/id_ed25519
          ANSIBLE_HOST_KEY_CHECKING: "False"
          SSH_AUTH_SOCK: ""
        run: |
          ansible-playbook playbook.yml \
            -vvv \
            -i "${VM_HOST}," \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o IdentitiesOnly=yes'"
